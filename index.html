<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ホットラインAIエージェント プロトタイプ</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #1f2937;
      --muted: #64748b;
      --line: #dbe3ee;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #e8f0ff;
      --safe: #047857;
      --safe-soft: #e7f7ef;
      --warn: #b45309;
      --warn-soft: #fff7ed;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      --radius: 22px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, #e7f0ff 0, transparent 34rem), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 20px 0 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .brand {
      flex: 1;
      display: flex;
      gap: 14px;
      align-items: center;
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(219,227,238,0.9);
      border-radius: 24px;
      padding: 16px 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #0f766e);
      color: white;
      font-weight: 800;
      letter-spacing: 0.02em;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.15;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .phone-box {
      width: min(330px, 34vw);
      min-width: 260px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .phone-box strong { display: block; font-size: 15px; margin-bottom: 4px; }
    .phone-box span { display: block; color: var(--muted); font-size: 13px; line-height: 1.45; }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .main-panel, .side-panel {
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .main-panel { overflow: hidden; }
    .side-panel {
      position: sticky;
      top: 16px;
      padding: 18px;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .status-item {
      padding: 14px 16px;
      border-right: 1px solid var(--line);
      min-height: 76px;
    }

    .status-item:last-child { border-right: 0; }
    .status-item b { display: block; font-size: 13px; color: var(--muted); font-weight: 700; }
    .status-item span { display: block; margin-top: 5px; font-weight: 800; }

    .content { padding: clamp(20px, 4vw, 36px); }

    .progress-wrap { margin-bottom: 22px; }
    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 9px;
    }

    .progress-bar {
      height: 10px;
      background: #e5eaf2;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #0f766e);
      border-radius: 999px;
      transition: width 240ms ease;
    }

    .chat-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-weight: 900;
      flex: 0 0 auto;
    }

    .bubble {
      width: 100%;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(15,23,42,0.05);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary-dark);
      font-weight: 800;
      font-size: 13px;
      background: var(--primary-soft);
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .bubble h2 {
      margin: 0 0 8px;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.22;
    }

    .bubble p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .choice-btn {
      min-height: 66px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 15px 16px;
      color: var(--text);
      box-shadow: 0 8px 18px rgba(15,23,42,0.04);
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .choice-btn:hover, .choice-btn:focus-visible {
      transform: translateY(-1px);
      border-color: #93b4ff;
      background: #f8fbff;
      outline: none;
    }

    .choice-btn .label {
      display: block;
      font-weight: 800;
      font-size: 16px;
      line-height: 1.4;
    }

    .choice-btn .sub {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-top: 5px;
      line-height: 1.45;
    }

    .form-card {
      margin-top: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
    }

    .field-label {
      display: block;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .input, .textarea {
      width: 100%;
      border: 1.5px solid #cbd5e1;
      border-radius: 16px;
      padding: 14px 15px;
      background: #fbfdff;
      color: var(--text);
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .textarea { min-height: 132px; resize: vertical; line-height: 1.7; }
    .input:focus, .textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .helper-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .error {
      margin-top: 12px;
      background: var(--danger-soft);
      color: #991b1b;
      border: 1px solid #fecaca;
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      min-height: 48px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--primary-soft); color: var(--primary-dark); }
    .btn-ghost { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .btn-warn { background: var(--warn-soft); color: #92400e; border: 1px solid #fed7aa; }
    .btn-danger { background: var(--danger-soft); color: #991b1b; border: 1px solid #fecaca; }

    .link-btn {
      border: 0;
      background: transparent;
      color: var(--primary-dark);
      padding: 0;
      font-weight: 800;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .notice {
      border-radius: 18px;
      padding: 14px 16px;
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .notice-safe { background: var(--safe-soft); border: 1px solid #b7ead2; color: #065f46; }
    .notice-warn { background: var(--warn-soft); border: 1px solid #fed7aa; color: #92400e; }
    .notice-blue { background: var(--primary-soft); border: 1px solid #bfdbfe; color: #1e40af; }

    .side-panel h3 { margin: 0 0 12px; font-size: 16px; }
    .side-list { display: grid; gap: 10px; margin: 0 0 16px; padding: 0; list-style: none; }
    .side-list li {
      padding: 12px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.55;
    }
    .side-list b { display: block; font-size: 14px; margin-bottom: 3px; }

    .summary-grid, .review-list {
      display: grid;
      gap: 12px;
    }

    .summary-box, .review-item, .edit-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px;
    }

    .summary-box h3, .review-item h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .summary-box p, .review-item p {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.65;
      font-weight: 650;
    }

    .review-item {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .review-label { color: var(--muted); font-weight: 800; }
    .review-value { white-space: pre-wrap; line-height: 1.55; }

    .preview {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 18px;
      padding: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
    }

    details {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      margin-top: 14px;
    }
    summary { cursor: pointer; font-weight: 900; }

    .sheet-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 13px;
      background: #fff;
    }
    .sheet-table th, .sheet-table td {
      border: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
    .sheet-table th { background: #f1f5f9; color: #475569; width: 210px; }

    .edit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .edit-item { text-align: left; width: 100%; }
    .edit-item b { display: block; margin-bottom: 5px; }
    .edit-item span { color: var(--muted); font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .done-card {
      text-align: center;
      padding: 12px 0;
    }
    .done-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: var(--safe-soft);
      color: var(--safe);
      font-weight: 1000;
      font-size: 34px;
    }
    .done-card h2 { margin: 0 0 10px; font-size: clamp(24px, 5vw, 38px); }
    .done-card p { color: var(--muted); line-height: 1.75; margin: 0 auto 20px; max-width: 660px; }
    .next-steps { display: grid; gap: 10px; max-width: 760px; margin: 20px auto; text-align: left; }
    .step-card { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 18px; padding: 14px 16px; }
    .step-card b { display: block; margin-bottom: 4px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.46);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(520px, 100%);
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .modal h2 { margin: 0 0 8px; }
    .modal p { margin: 0; color: var(--muted); line-height: 1.7; }

    @media (max-width: 900px) {
      .topbar { flex-direction: column; }
      .phone-box { width: 100%; }
      .main-grid { grid-template-columns: 1fr; }
      .side-panel { position: static; }
      .status-strip { grid-template-columns: 1fr; }
      .status-item { border-right: 0; border-bottom: 1px solid var(--line); min-height: auto; }
      .status-item:last-child { border-bottom: 0; }
      .choice-grid, .edit-grid { grid-template-columns: 1fr; }
      .review-item { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      .shell { width: min(100% - 16px, 1180px); padding-top: 8px; }
      .brand { align-items: flex-start; }
      .brand-mark { width: 42px; height: 42px; border-radius: 14px; }
      .content { padding: 18px; }
      .choice-btn { min-height: 58px; }
      .actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="phoneModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="phoneTitle">
    <div class="modal">
      <h2 id="phoneTitle">電話相談に切り替えできます</h2>
      <p>不安が強い場合や、入力する時間がない場合は、社内で定めたホットライン番号へ電話してください。このプロトタイプでは実番号を設定していません。</p>
      <div class="actions">
        <button class="btn btn-primary" id="closePhoneModal">閉じる</button>
      </div>
    </div>
  </div>
  <script src="./hotline_app.js"></script>
</body>
</html>
