<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>ホットラインAIエージェント ローカルプロトタイプ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <noscript>
    <div class="noscript">
      このプロトタイプを利用するには、ブラウザのJavaScriptを有効にしてください。
    </div>
  </noscript>

  <div id="app" class="app-shell">
    <header class="chat-header app-header" aria-label="アプリヘッダー">
      <div class="header-main">
        <span class="bot-mark" aria-hidden="true">HL</span>
        <div class="header-title-block">
          <h1>ホットラインAIエージェント</h1>
          <p>チャットで必要事項を一つずつ確認します</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="fontButton" class="header-button" type="button">文字を大きく</button>
        <button id="resetButton" class="header-button danger" type="button">最初から</button>
      </div>
    </header>

    <main class="app-main" aria-label="ホットラインAIエージェント本体">
      <section class="chat-window" aria-label="ホットラインAIエージェント">
        <section class="bot-area" aria-label="チャットボット会話エリア">
          <div id="chatLog" class="chat-log" aria-live="polite" aria-label="会話履歴" role="log"></div>
        </section>

        <section class="answer-panel" aria-label="回答操作エリア">
          <div class="panel-topline">
            <span class="panel-label">次に操作する場所</span>
            <span id="progressText" class="progress-text">準備中</span>
          </div>
          <div id="questionArea" class="question-area"></div>
        </section>
      </section>
    </main>

    <footer class="app-footer" aria-label="補助操作">
      <div class="assist-actions">
        <button id="editButton" class="assist-button" type="button">回答を修正</button>
        <button id="phoneButton" class="assist-button" type="button">電話で相談</button>
      </div>
    </footer>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
